<!DOCTYPE html>
<html>
<head>
  <title>Timetable CRUD</title>
</head>
<body>

<h1>📅 Timetable</h1>

<button onclick="loadSchedule()">View All</button>

<div id="output"></div>

<h2>Add Schedule</h2>

<input id="subjectName" placeholder="Subject Name">
<input id="instructorName" placeholder="Instructor Name">
<input id="room" placeholder="Room">
<input id="startTime" placeholder="Start Time">
<input id="endTime" placeholder="End Time">
<input id="day" placeholder="Day">

<button onclick="addSchedule()">Add</button>

<script>
const API = "/schedule";

// =====================
// READ
// =====================
async function loadSchedule() {
  const res = await fetch(API);
  const data = await res.json();

  let html = "";

  data.forEach(s => {
    html += `
      <p>
        <b>${s.subjectName}</b><br>
        Instructor: ${s.instructorName}<br>
        Room: ${s.room}<br>
        ${s.startTime} - ${s.endTime}<br>
        Day: ${s.day}<br>

        <button onclick="deleteSchedule(${s.id})">Delete</button>
        <button onclick="editSchedule(${s.id})">Edit</button>
      </p>
      <hr>
    `;
  });

  document.getElementById("output").innerHTML = html;
}

// =====================
// CREATE
// =====================
async function addSchedule() {
  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      subjectName: subjectName.value,
      instructorName: instructorName.value,
      room: room.value,
      startTime: startTime.value,
      endTime: endTime.value,
      day: day.value
    })
  });

  loadSchedule();
}

// =====================
// DELETE
// =====================
async function deleteSchedule(id) {
  await fetch(`${API}/${id}`, {
    method: "DELETE"
  });

  loadSchedule();
}

// =====================
// UPDATE (simple prompt version)
// =====================
async function editSchedule(id) {
  const subjectName = prompt("New Subject Name:");
  const instructorName = prompt("New Instructor Name:");
  const room = prompt("New Room:");
  const startTime = prompt("New Start Time:");
  const endTime = prompt("New End Time:");
  const day = prompt("New Day:");

  await fetch(`${API}/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      subjectName,
      instructorName,
      room,
      startTime,
      endTime,
      day
    })
  });

  loadSchedule();
}
</script>

</body>
</html>
